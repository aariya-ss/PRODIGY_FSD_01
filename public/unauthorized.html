<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied - SecureAuth</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  
  <div class="container text-center">
    <div class="glass-card" style="padding: 50px 30px;">
      <!-- Shield / Warn Icon -->
      <div style="font-size: 4.5rem; margin-bottom: 20px; line-height: 1;">🛡️</div>
      
      <h1 style="font-size: 1.8rem; margin-bottom: 15px; color: var(--danger); font-weight: 700;">
        Access Denied
      </h1>
      
      <p style="color: var(--text-muted); line-height: 1.6; margin-bottom: 30px; font-size: 0.95rem;">
        You do not have the required administrative permissions to access this page. Attempting to enter restricted resources is logged.
      </p>

      <button class="btn" onclick="window.location.href='/dashboard'">
        Return to Dashboard
      </button>
      
      <button class="btn btn-secondary" onclick="logout()" style="margin-top: 15px;">
        Sign In as Another User
      </button>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
